<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Project</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
    h1 { color: #6c63ff; margin-bottom: 24px; }
    input, textarea { width: 100%; padding: 10px; margin-bottom: 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
    input:focus, textarea:focus { border-color: #6c63ff; outline: none; }
    button { background: #6c63ff; color: white; border: none; padding: 12px 28px; border-radius: 8px; font-size: 15px; cursor: pointer; }
    button:hover { background: #574fd6; }
    #status { margin-top: 14px; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Add New Project</h1>
  <input type="text" id="title" placeholder="Project Title" />
  <textarea id="description" rows="3" placeholder="Project Description"></textarea>
  <input type="text" id="tags" placeholder="Tags (comma separated): HTML, CSS, Node.js" />
  <input type="text" id="liveUrl" placeholder="Live URL (https://...)" />
  <input type="text" id="githubUrl" placeholder="GitHub URL (https://...)" />
  <button onclick="addProject()">Add Project</button>
  <p id="status"></p>

  <script>
    async function addProject() {
      const title       = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      const tags        = document.getElementById('tags').value.split(',').map(t => t.trim()).filter(Boolean);
      const liveUrl     = document.getElementById('liveUrl').value.trim();
      const githubUrl   = document.getElementById('githubUrl').value.trim();
      const status      = document.getElementById('status');

      if (!title || !description) {
        status.style.color = '#ef4444';
        status.textContent = 'Title and description are required!';
        return;
      }

      try {
        const res = await fetch('http://localhost:5000/api/projects', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description, tags, liveUrl, githubUrl })
        });
        const data = await res.json();
        if (data.success) {
          status.style.color = '#22c55e';
          status.textContent = 'Project added successfully!';
          document.querySelectorAll('input, textarea').forEach(el => el.value = '');
        } else {
          throw new Error(data.message);
        }
      } catch (err) {
        status.style.color = '#ef4444';
        status.textContent = 'Error: ' + err.message;
      }
    }
  </script>
</body>
</html>
